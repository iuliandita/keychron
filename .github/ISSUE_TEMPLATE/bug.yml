name: Bug Report
description: Something is wrong or outdated
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the issue.
    validations:
      required: true

  - type: dropdown
    id: keyboard
    attributes:
      label: Keyboard model
      options:
        - K2
        - K6
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the documentation say instead?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: OS, distro, firmware version, or anything else relevant.
    validations:
      required: false
